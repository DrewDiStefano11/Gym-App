name: Validate FitCore PRs

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            # Check if there are any dependencies or devDependencies to install
            if grep -qE '"dependencies":\s*\{[^}]+\}' package.json || grep -qE '"devDependencies":\s*\{[^}]+\}' package.json; then
              npm install
            else
              echo "No dependencies found in package.json, skipping npm install."
            fi
          fi

      - name: Validate src/app.js
        run: node --check src/app.js

      - name: Validate scripts/server.mjs
        run: node --check scripts/server.mjs

      - name: Validate src/fitcore-bootstrap.js
        run: |
          if [ -f src/fitcore-bootstrap.js ]; then
            node --check src/fitcore-bootstrap.js
          else
            echo "src/fitcore-bootstrap.js not found, skipping check."
          fi

      - name: Run FitCore Safety Check
        run: node scripts/safety-check.mjs
